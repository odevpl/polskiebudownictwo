<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Ustawienia | Akademia</title>
    <link rel="stylesheet" href="/global.css" />
  </head>
  <body class="academy-page">
    <header class="site-header">
      <div class="container site-header__inner">
        <a class="site-logo" href="/" aria-label="Polskie Budownictwo">
          <img src="/assets/images/logo.png" alt="Polskie Budownictwo" />
        </a>
        <button class="site-menu-toggle" type="button" aria-controls="site-nav" aria-expanded="false" aria-label="Otwórz menu">
          <span></span><span></span><span></span>
        </button>
        <nav class="site-nav" id="site-nav" aria-label="Główna nawigacja">
          <a href="/#misja">Misja</a>
          <a href="/#dzialania">Obszary działania</a>
          <a href="/wydarzenia">Wydarzenia</a>
          <a href="/#spolecznosc">Społeczność</a>
          <a href="/#kontakt">Kontakt</a>
          <span class="site-nav__account" data-auth-menu><a href="/logowanie.html">Zaloguj się</a></span>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container academy-settings" data-account-settings>
        <header class="academy-settings__header">
          <p class="eyebrow">Strefa użytkownika</p>
          <h1>Ustawienia konta</h1>
          <p>Zarządzaj danymi kontaktowymi, bezpieczeństwem konta i danymi potrzebnymi do wystawienia faktury.</p>
          <p class="form-status" data-account-status role="status" aria-live="polite"></p>
        </header>

        <div class="academy-settings__grid">
          <section class="academy-settings__card" aria-labelledby="account-security-title">
            <h2 id="account-security-title">Bezpieczeństwo konta</h2>
            <form class="form" data-password-form action="/api/auth/account/password" method="post">
              <div class="field">
                <label for="account-email">Adres e-mail</label>
                <input id="account-email" data-account-email data-user-email type="email" readonly />
              </div>
              <div class="form-grid">
                <div class="field">
                  <label for="current-password">Aktualne hasło</label>
                  <input id="current-password" name="currentPassword" type="password" autocomplete="current-password" required />
                </div>
                <div class="field">
                  <label for="new-password">Nowe hasło</label>
                  <input id="new-password" name="newPassword" type="password" minlength="12" autocomplete="new-password" required />
                </div>
              </div>
              <button class="button" type="submit">Zmień hasło</button>
              <p class="form-status" data-form-status role="status" aria-live="polite"></p>
            </form>
          </section>

          <section class="academy-settings__card" aria-labelledby="account-profile-title">
            <h2 id="account-profile-title">Dane kontaktowe</h2>
            <form class="form" data-profile-form data-method="PUT" action="/api/auth/account/profile" method="post">
              <div class="form-grid">
                <div class="field">
                  <label for="first-name">Imię</label>
                  <input id="first-name" name="firstName" type="text" autocomplete="given-name" maxlength="80" />
                </div>
                <div class="field">
                  <label for="last-name">Nazwisko</label>
                  <input id="last-name" name="lastName" type="text" autocomplete="family-name" maxlength="120" />
                </div>
                <div class="field field--full">
                  <label for="phone">Telefon</label>
                  <input id="phone" name="phone" type="tel" autocomplete="tel" maxlength="30" />
                </div>
              </div>
              <button class="button" type="submit">Zapisz dane kontaktowe</button>
              <p class="form-status" data-form-status role="status" aria-live="polite"></p>
            </form>
          </section>

          <section class="academy-settings__card academy-settings__card--wide" aria-labelledby="account-billing-title">
            <h2 id="account-billing-title">Dane do faktury</h2>
            <form class="form" data-billing-form data-method="PUT" action="/api/auth/account/billing" method="post">
              <div class="form-grid">
                <div class="field">
                  <label for="billing-type">Typ danych</label>
                  <select id="billing-type" name="billingType" required>
                    <option value="company">Firma</option>
                    <option value="individual">Osoba prywatna</option>
                  </select>
                </div>
                <div class="field">
                  <label for="company-name">Nazwa firmy lub imię i nazwisko</label>
                  <input id="company-name" name="companyName" type="text" autocomplete="organization" maxlength="200" />
                </div>
                <div class="field" data-company-only>
                  <label for="nip">NIP</label>
                  <input id="nip" name="nip" type="text" inputmode="numeric" autocomplete="off" maxlength="13" />
                </div>
                <div class="field">
                  <label for="billing-email">E-mail do faktury</label>
                  <input id="billing-email" name="billingEmail" type="email" autocomplete="email" maxlength="254" />
                </div>
                <div class="field">
                  <label for="street">Ulica</label>
                  <input id="street" name="street" type="text" autocomplete="street-address" maxlength="160" />
                </div>
                <div class="field">
                  <label for="building-number">Numer budynku</label>
                  <input id="building-number" name="buildingNumber" type="text" autocomplete="address-line1" maxlength="20" />
                </div>
                <div class="field">
                  <label for="apartment-number">Numer lokalu</label>
                  <input id="apartment-number" name="apartmentNumber" type="text" autocomplete="address-line2" maxlength="20" />
                </div>
                <div class="field">
                  <label for="postal-code">Kod pocztowy</label>
                  <input id="postal-code" name="postalCode" type="text" autocomplete="postal-code" maxlength="10" />
                </div>
                <div class="field">
                  <label for="city">Miejscowość</label>
                  <input id="city" name="city" type="text" autocomplete="address-level2" maxlength="100" />
                </div>
                <div class="field">
                  <label for="country">Kraj</label>
                  <input id="country" name="country" type="text" autocomplete="country-name" maxlength="100" />
                </div>
              </div>
              <button class="button" type="submit">Zapisz dane do faktury</button>
              <p class="form-status" data-form-status role="status" aria-live="polite"></p>
            </form>
          </section>
        </div>

        <p class="academy-settings__back"><a href="/akademia/">Wróć do Akademii</a></p>
      </div>
    </main>

    <script src="/assets/js/menu.js" defer></script>
    <script src="/assets/js/academy.js?v=2" defer></script>
  </body>
</html>
