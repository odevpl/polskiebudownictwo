<!doctype html>
<html lang="pl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Rejestracja | Polskie Budownictwo</title><link rel="stylesheet" href="/global.css"></head>
<body class="auth-page"><main class="auth-layout"><section class="auth-panel"><a class="auth-back" href="/" aria-label="Wróć na stronę główną">←</a><a class="auth-logo" href="/"><img src="/assets/images/logo.png" alt="Polskie Budownictwo"></a><div class="auth-form-wrap"><p class="eyebrow">Strefa użytkownika</p><h1>Załóż konto</h1><p class="auth-intro">Dołącz do Akademii Polskiego Budownictwa.</p><form class="auth-form" data-auth-form action="/api/auth/register"><div class="field"><label for="email">E-mail</label><input id="email" name="email" type="email" required autocomplete="email"></div><div class="field"><label for="password">Hasło <span>(minimum 12 znaków)</span></label><input id="password" name="password" type="password" required minlength="12" autocomplete="new-password"></div><button class="button" type="submit">Zarejestruj się</button><p class="form-status" data-auth-status aria-live="polite"></p></form><p class="auth-links">Masz już konto? <a href="/logowanie.html">Zaloguj się</a>.</p></div></section><aside class="auth-showcase"><div><p class="eyebrow">Akademia</p><h2>Wiedza, która wspiera polskie budownictwo.</h2><ul><li>Materiały eksperckie</li><li>Praktyczne narzędzia dla firm</li><li>Aktualności i szkolenia</li></ul></div></aside></main><script src="/assets/js/auth.js" defer></script></body></html>
